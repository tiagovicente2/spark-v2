<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spark - Identity-Aware Proxy Simulation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070913;
      --card-bg: rgba(22, 28, 45, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --accent: #00f2fe;
      --accent-rgb: 0, 242, 254;
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: var(--bg);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(79, 172, 254, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(0, 242, 254, 0.1) 0%, transparent 40%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .login-container {
      width: 100%;
      max-width: 500px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      position: relative;
    }

    .login-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      border-radius: 24px 24px 0 0;
    }

    .logo-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff 30%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .logo-header h1 span {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 6px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .form-control {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.15);
    }

    .avatar-selection {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 10px;
    }

    .avatar-option {
      position: relative;
      cursor: pointer;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid transparent;
      aspect-ratio: 1;
      transition: all 0.2s ease;
    }

    .avatar-option img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-option.selected {
      border-color: var(--accent);
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(var(--accent-rgb), 0.3);
    }

    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: #020617;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 10px;
      box-shadow: 0 4px 15px rgba(0, 242, 254, 0.25);
    }

    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0, 242, 254, 0.35);
    }

    .btn-submit:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo-header">
      <h1>⚡ SPARK<span>.iap</span></h1>
      <p>Simulate Shopify's Identity-Aware Proxy headers</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" class="form-control" placeholder="e.g. Daniel Beauchamp" required>
      </div>

      <div class="form-group">
        <label for="email">Shopify Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="e.g. dbeauchamp@shopify.com" required>
      </div>

      <div class="form-group">
        <label for="role">Job Title / Role</label>
        <input type="text" id="role" class="form-control" placeholder="e.g. Director of VR/AR & AI Exploration" required>
      </div>

      <div class="form-group">
        <label for="team">Team Name</label>
        <input type="text" id="team" class="form-control" placeholder="e.g. Vibe Coding Labs" required>
      </div>

      <div class="form-group">
        <label>Select Avatar Profile</label>
        <div class="avatar-selection">
          <div class="avatar-option selected" data-url="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&h=150&q=80">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&h=150&q=80" alt="Avatar 1">
          </div>
          <div class="avatar-option" data-url="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=150&h=150&q=80">
            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=150&h=150&q=80" alt="Avatar 2">
          </div>
          <div class="avatar-option" data-url="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=150&h=150&q=80">
            <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=150&h=150&q=80" alt="Avatar 3">
          </div>
          <div class="avatar-option" data-url="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=150&h=150&q=80">
            <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=150&h=150&q=80" alt="Avatar 4">
          </div>
        </div>
      </div>

      <button type="submit" class="btn-submit">Sign In and Grant Sandbox Headers</button>
    </form>
  </div>

  <script>
    let selectedAvatar = 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&h=150&q=80';

    document.querySelectorAll('.avatar-option').forEach(option => {
      option.addEventListener('click', () => {
        document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
        option.classList.add('selected');
        selectedAvatar = option.dataset.url;
      });
    });

    // Handle form submit
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        role: document.getElementById('role').value,
        team: document.getElementById('team').value,
        slack: '@' + document.getElementById('name').value.toLowerCase().replace(/\s+/g, ''),
        avatar: selectedAvatar
      };

      try {
        const res = await fetch('/_spark/api/identity/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (res.ok) {
          // Redirect to the return url or dashboard
          const params = new URLSearchParams(window.location.search);
          const next = params.get('next') || '/_spark/dashboard/';
          window.location.href = next;
        } else {
          alert('Login failed');
        }
      } catch (err) {
        console.error(err);
        alert('Login failed');
      }
    });
  </script>
</body>
</html>
